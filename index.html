<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藝穗節互動：希望的紙飛機</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 重置與防跑版設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #050505; /* 深邃的底色 */
      overflow: hidden; /* 防止滾動 */
      font-family: "PingFang TC", "Helvetica Neue", sans-serif;
    }

    /* =========================================
       360度環景圖預留區塊
       ========================================= */
    #panorama-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%; /* 寬度加倍以利於水平捲動動畫 */
      height: 100%;
      /* ★ 替換為您的 360 度環景圖網址 ★ */
      background-image: url('back.jpg'); 
      background-size: 50% 100%; /* 讓圖片能正確重複 */
      background-repeat: repeat-x;
      background-position: left center;
      z-index: 0;
      opacity: 0.25; /* 預設昏暗，不搶奪主視覺 */
      animation: pan360 90s linear infinite; /* 緩慢旋轉動畫 */
      transition: filter 3s ease-in-out, opacity 3s ease-in-out;
    }

    /* 穿梭時的背景變化 (模糊 + 提亮) */
    .panorama-flying {
      filter: blur(8px) brightness(1.8);
      opacity: 0.5 !important;
    }

    /* 模擬 360 度旋轉的動畫 */
    @keyframes pan360 {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }


    /* 紙飛機 3D 穿梭動畫 */
    #airplane-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 50%);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
      perspective: 1000px;
    }

    .fly-animation {
      animation: flyIntoDepth 4s cubic-bezier(0.5, 0, 0.2, 1) forwards;
    }

    @keyframes flyIntoDepth {
      0% {
        transform: translate(-50%, 150px) scale(2) rotateX(-20deg);
        opacity: 0;
        filter: blur(2px);
      }
      10% {
        transform: translate(-50%, 80px) scale(1.5) rotateX(-10deg);
        opacity: 1;
        filter: blur(0px);
      }
      100% {
        transform: translate(-50%, -50px) scale(0) rotateX(10deg);
        opacity: 0;
        filter: blur(4px);
      }
    }

    /* UI 淡入淡出控制 */
    .fade-transition {
      transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
    }
    .step-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
    }
    .step-active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* 中央微光 (結尾出現) */
    #center-light {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 2px;
      box-shadow: 0 0 100px 50px rgba(200, 230, 255, 0);
      transition: box-shadow 4s ease-in-out;
      z-index: 10;
      pointer-events: none;
    }
    .light-active {
      box-shadow: 0 0 300px 200px rgba(200, 230, 255, 0.45) !important;
    }

    /* 結尾白光 */
    #white-out {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 5s ease-in-out;
    }
    .white-out-active {
      opacity: 1 !important;
    }
  </style>
</head>
<body class="text-gray-200 selection:bg-red-900">

  <!-- 背景：360度環景圖 (透過 CSS 進行無限水平捲動) -->
  <div id="panorama-bg"></div>

  <!-- 前景：3D 粒子穿梭畫布 -->
  <canvas id="bgCanvas" class="absolute top-0 left-0 w-full h-full z-10 pointer-events-none"></canvas>
  <div id="center-light"></div>

  <!-- 結尾白光遮罩 -->
  <div id="white-out"></div>

  <!-- UI 容器 -->
  <div class="relative z-30 w-full h-full flex flex-col items-center justify-center px-6 max-w-md mx-auto">
    
    <!-- 步驟 0: 引言沈浸 -->
    <div id="step-0" class="absolute w-full px-6 fade-transition step-active text-center tracking-[0.1em] sm:tracking-[0.2em] leading-loose">
      <p class="text-gray-400 text-xs sm:text-sm animate-pulse mb-8 whitespace-nowrap">走在冰冷的長廊，盡頭沒有光。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">大人說，只要不出聲，惡魔飛機就找不到我們。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">但在黑暗裡，我們把恐懼，摺成了希望。</p>
      <button id="btn-enter" class="mt-16 px-6 sm:px-8 py-3 border border-gray-600 rounded-full text-xs sm:text-sm hover:bg-gray-800 hover:border-gray-400 transition-all duration-500 tracking-widest text-gray-300 whitespace-nowrap">
        進入記憶
      </button>
    </div>

    <!-- 步驟 1: 互動表單 -->
    <div id="step-1" class="absolute w-full px-6 fade-transition step-hidden">
      <form id="message-form" class="flex flex-col space-y-8 w-full">
        <div class="text-center mb-4 space-y-2">
          <h2 class="text-base sm:text-lg font-light tracking-[0.1em] sm:tracking-[0.15em] text-gray-100 drop-shadow-md whitespace-nowrap">如果戰爭的盡頭是希望</h2>
          <p class="text-xs sm:text-sm text-gray-400 tracking-widest whitespace-nowrap">你想對愛的人說什麼？</p>
        </div>

        <div class="relative">
          <!-- 移除 required 避免預覽環境報錯 -->
          <textarea id="input-message" placeholder="寫下你的思念..." class="w-full bg-black/40 backdrop-blur-sm border border-gray-700 rounded-md pb-2 pt-4 px-4 text-gray-200 focus:outline-none focus:border-red-800 transition-colors resize-none h-32 placeholder:text-gray-600 tracking-wider text-sm leading-relaxed"></textarea>
        </div>

        <div class="relative">
          <p class="text-[10px] sm:text-xs text-gray-500 mb-2 tracking-wider drop-shadow-md whitespace-nowrap">這份信件，將於半年後寄出。</p>
          <!-- 移除 required 避免預覽環境報錯 -->
          <input id="input-email" type="email" placeholder="收件人 Email" class="w-full bg-black/40 backdrop-blur-sm border border-gray-700 rounded-md py-3 px-4 text-gray-200 focus:outline-none focus:border-red-800 transition-colors placeholder:text-gray-600 tracking-wider text-sm" />
        </div>

        <button id="btn-submit" type="button" class="w-full py-4 mt-8 border border-gray-500 bg-white/5 backdrop-blur-md text-gray-300 rounded-md hover:bg-white/10 hover:text-white transition-all duration-500 tracking-[0.15em] sm:tracking-[0.2em] text-xs sm:text-sm flex items-center justify-center space-x-2 whitespace-nowrap">
          <span id="btn-text">摺成紙飛機並寄出</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </div>

    <!-- 步驟 3: 最終結尾 -->
    <div id="step-3" class="absolute w-full px-6 fade-transition step-hidden text-center tracking-[0.15em] sm:tracking-[0.2em] leading-loose drop-shadow-lg">
      <p class="text-gray-100 mb-6 text-base sm:text-lg whitespace-nowrap">已為您折妥。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">那些轟炸與恐懼終將遠去。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">半年後，</p>
      <p class="text-gray-100 text-xs sm:text-sm whitespace-nowrap">這份希望將會抵達。</p>
      <div class="pt-20">
        <p class="text-[10px] sm:text-xs text-gray-400 tracking-widest animate-pulse whitespace-nowrap">挺過之後一切都會變好的。</p>
      </div>
    </div>

  </div>

  <!-- 紙飛機 SVG 元素 -->
  <div id="airplane-container">
    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 15px rgba(255,255,255,0.8));">
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </div>

  <!-- Firebase 模組引入與邏輯 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD5_p-5RLRJbLLWRDbh7Im2lDTwqQgseRI",
      authDomain: "atr2026-b538a.firebaseapp.com",
      projectId: "atr2026-b538a",
      storageBucket: "atr2026-b538a.firebasestorage.app",
      messagingSenderId: "484101433417",
      appId: "1:484101433417:web:659f1dba534ed90ae3b798",
      measurementId: "G-XDCKP1ZZVZ"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'art2026-fringe';
    let currentUser = null;

    // 匿名登入 (加入防呆，即使出錯也不影響後續動畫)
    const initAuth = async () => {
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.warn("Firebase 授權可能被瀏覽器或預覽環境阻擋，將啟用容錯模式:", error);
      }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
    });

    // --- 3D 穿梭畫布特效 (Canvas Starfield/Tunnel) ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    
    // 強化：大幅增加粒子數量至 10000 (營造極致沈浸感，若手機運行卡頓可適度調降)
    const numParticles = 10000; 

    // 物理與動畫變數
    let baseSpeed = 1.0;   // 基礎前進速度
    let currentSpeed = baseSpeed;
    let targetSpeed = baseSpeed;
    let isFlying = false;  

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // 初始化 3D 粒子 (加深空間感)
    for (let i = 0; i < numParticles; i++) {
      particles.push({
        x: (Math.random() - 0.5) * 4000, // 更廣的 X 軸
        y: (Math.random() - 0.5) * 4000, // 更廣的 Y 軸
        z: Math.random() * 3000,         // 更深的 Z 軸
        size: Math.random() * 1.5 + 0.3, // 大小差異化
        isEmber: Math.random() > 0.85    // 15% 呈紅色火星
      });
    }

    function renderCanvas() {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = `rgba(0, 0, 0, ${isFlying ? 0.6 : 0.25})`; 
      ctx.fillRect(0, 0, width, height);
      
      ctx.globalCompositeOperation = 'source-over';
      currentSpeed += (targetSpeed - currentSpeed) * 0.03;

      const centerX = width / 2;
      const centerY = height / 2;
      const fov = 400; // 視角深度

      particles.forEach(p => {
        p.z -= currentSpeed;

        if (p.z <= 0) {
          p.z = 3000;
          p.x = (Math.random() - 0.5) * 4000;
          p.y = (Math.random() - 0.5) * 4000;
        }

        const scale = fov / p.z;
        const screenX = centerX + p.x * scale;
        const screenY = centerY + p.y * scale;

        const opacity = Math.min((3000 - p.z) / 1000, 1);
        const radius = Math.max(p.size * scale, 0.1);

        if (screenX > 0 && screenX < width && screenY > 0 && screenY < height) {
          ctx.beginPath();
          ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
          
          if (isFlying) {
            ctx.fillStyle = `rgba(220, 240, 255, ${opacity * 0.9})`;
          } else {
            ctx.fillStyle = p.isEmber 
              ? `rgba(200, 50, 50, ${opacity * 0.9})` 
              : `rgba(130, 130, 130, ${opacity * 0.5})`;
          }
          ctx.fill();
        }
      });

      requestAnimationFrame(renderCanvas);
    }
    renderCanvas();

    // --- UI 流程與互動邏輯 ---
    const step0 = document.getElementById('step-0');
    const step1 = document.getElementById('step-1');
    const step3 = document.getElementById('step-3');
    const btnEnter = document.getElementById('btn-enter');
    const inputMessage = document.getElementById('input-message');
    const inputEmail = document.getElementById('input-email');
    const airplaneContainer = document.getElementById('airplane-container');
    const centerLight = document.getElementById('center-light');
    const panoramaBg = document.getElementById('panorama-bg');
    const btnSubmit = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    const whiteOut = document.getElementById('white-out');

    function switchStep(hideElem, showElem) {
      hideElem.classList.remove('step-active');
      hideElem.classList.add('step-hidden');
      setTimeout(() => {
        showElem.classList.remove('step-hidden');
        showElem.classList.add('step-active');
      }, 1500); 
    }

    btnEnter.addEventListener('click', () => {
      switchStep(step0, step1);
    });

    // 改監聽按鈕點擊，取代 form submit (避免預覽環境的各種阻擋)
    btnSubmit.addEventListener('click', async () => {
      const msgVal = inputMessage.value.trim();
      const emailVal = inputEmail.value.trim();
      const origText = "摺成紙飛機並寄出";
      
      // 1. 自訂表單驗證 (如果沒填寫，按鈕會變成提示文字)
      if (!msgVal || !emailVal) {
        btnText.textContent = "請填寫思念與收件信箱";
        setTimeout(() => btnText.textContent = origText, 3000);
        return;
      }

      btnSubmit.disabled = true;
      btnText.textContent = "傳遞中...";

      // 2. 準備使用者 ID (如果登入失敗，就配發隨機訪客ID)
      const uid = currentUser ? currentUser.uid : "guest-" + Math.floor(Math.random() * 100000);

      // 3. 嘗試寫入 Firebase (即使失敗也偷偷捕獲，不中斷體驗)
      try {
        const messagesRef = collection(db, 'artifacts', appId, 'users', uid, 'future_messages');
        await addDoc(messagesRef, {
          message: msgVal,
          email: emailVal,
          createdAt: serverTimestamp(),
          scheduledSendTime: new Date(Date.now() + 180 * 24 * 60 * 60 * 1000), 
          status: 'pending'
        });
      } catch (error) {
        console.warn("寫入資料庫失敗 (可能為預覽環境限制)，但繼續播放視覺動畫:", error);
      }

      // === 無論資料庫是否成功，都強制執行以下動畫體驗 ===

      // 隱藏表單
      step1.classList.remove('step-active');
      step1.classList.add('step-hidden');

      // 動畫啟動 (紙飛機飛出 + 粒子加速)
      airplaneContainer.classList.add('fly-animation');
      isFlying = true;
      targetSpeed = 50.0; // 極速前進
      centerLight.classList.add('light-active'); 
      panoramaBg.classList.add('panorama-flying'); // 360 環景圖光影變化

      // 4秒後進入最終結尾
      setTimeout(() => {
        targetSpeed = baseSpeed; // 恢復平靜速度
        switchStep(step1, step3);

        // 15秒後開始白光吞噬特效 (動畫時長 5 秒)
        setTimeout(() => {
          whiteOut.classList.add('white-out-active');
        }, 15000);

        // 結尾文字出現後，20 秒後自動跳回 index.html
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 20000);

      }, 4000);
    });
  </script>
</body>
</html>
