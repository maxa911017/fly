<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藝穗節互動：希望的紙飛機</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 重置與防跑版設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #050505;
      overflow: hidden;
      font-family: "PingFang TC", "Helvetica Neue", sans-serif;
      touch-action: none;
    }

    #panorama-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background-image: url('back.jpg'); 
      background-size: 50% 100%;
      background-repeat: repeat-x;
      background-position: left center;
      z-index: 0;
      opacity: 0.25;
      animation: pan360 90s linear infinite;
      transition: filter 3s ease-in-out, opacity 3s ease-in-out;
    }

    .panorama-flying {
      filter: blur(8px) brightness(1.8);
      opacity: 0.5 !important;
    }

    @keyframes pan360 {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* --- UI 淡入淡出與縮放變形 --- */
    .fade-transition { transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .step-hidden { opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95); }
    .step-active { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    
    .folding-out { opacity: 0; pointer-events: none; transform: translateY(50px) scale(0.5) rotateX(45deg); transition: all 1s ease-in; }

    /* --- 紙飛機專區 --- */
    #airplane-wrapper {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 50;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 20vh;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .floating-plane {
      animation: floatPlane 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(200,230,255,0.6));
    }

    @keyframes floatPlane {
      0% { transform: translateY(0px) rotateZ(-2deg) rotateX(10deg); }
      50% { transform: translateY(-15px) rotateZ(2deg) rotateX(5deg); }
      100% { transform: translateY(0px) rotateZ(-2deg) rotateX(10deg); }
    }

    #throw-hint {
      position: absolute;
      bottom: 10vh;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      pointer-events: none;
      animation: pulseHint 2s infinite;
    }

    @keyframes pulseHint {
      0% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 0.8; transform: translateY(-10px); }
      100% { opacity: 0.3; transform: translateY(0); }
    }

    .fly-animation {
      animation: aerodynamicFly 4s cubic-bezier(0.3, 0.0, 0.2, 1) forwards;
    }

    @keyframes aerodynamicFly {
      0% { transform: translateY(0) scale(1.2) rotateX(10deg) rotateZ(0deg); opacity: 1; filter: blur(0px); }
      15% { transform: translateY(-150px) translateX(-30px) scale(0.9) rotateX(30deg) rotateZ(-15deg); opacity: 1; filter: blur(0px); }
      40% { transform: translateY(-300px) translateX(20px) scale(0.6) rotateX(10deg) rotateZ(10deg); filter: blur(1px); }
      70% { transform: translateY(-450px) translateX(-10px) scale(0.3) rotateX(40deg) rotateZ(-5deg); opacity: 0.8; filter: blur(2px); }
      100% { transform: translateY(-600px) translateX(0) scale(0) rotateX(10deg) rotateZ(0deg); opacity: 0; filter: blur(5px); }
    }

    /* 中央微光 */
    #center-light {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 2px;
      box-shadow: 0 0 100px 50px rgba(200, 230, 255, 0);
      transition: box-shadow 4s ease-in-out;
      z-index: 10;
      pointer-events: none;
    }
    .light-active { box-shadow: 0 0 350px 250px rgba(200, 230, 255, 0.5) !important; }

    /* 結尾白光 */
    #white-out {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffffff;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 5s ease-in-out;
    }
    .white-out-active { opacity: 1 !important; }
  </style>
</head>
<body class="text-gray-200 selection:bg-red-900">

  <div id="panorama-bg"></div>
  <canvas id="bgCanvas" class="absolute top-0 left-0 w-full h-full z-10 pointer-events-none"></canvas>
  <div id="center-light"></div>
  <div id="white-out"></div>

  <!-- UI 容器 -->
  <div class="relative z-30 w-full h-full flex flex-col items-center justify-center px-6 max-w-md mx-auto" id="ui-container">
    
    <!-- 步驟 0 -->
    <div id="step-0" class="absolute w-full px-6 fade-transition step-active text-center tracking-[0.1em] sm:tracking-[0.2em] leading-loose">
      <p class="text-gray-400 text-xs sm:text-sm animate-pulse mb-8 whitespace-nowrap">走在冰冷的長廊，盡頭沒有光。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">大人說，只要不出聲，惡魔飛機就找不到我們。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">但在黑暗裡，我們把恐懼，摺成了希望。</p>
      <button id="btn-enter" class="mt-16 px-6 sm:px-8 py-3 border border-gray-600 rounded-full text-xs sm:text-sm hover:bg-gray-800 hover:border-gray-400 transition-all duration-500 tracking-widest text-gray-300 whitespace-nowrap">
        進入記憶
      </button>
    </div>

    <!-- 步驟 1 -->
    <div id="step-1" class="absolute w-full px-6 fade-transition step-hidden">
      <form id="message-form" class="flex flex-col space-y-8 w-full">
        <div class="text-center mb-4 space-y-2">
          <h2 class="text-base sm:text-lg font-light tracking-[0.1em] sm:tracking-[0.15em] text-gray-100 drop-shadow-md whitespace-nowrap">如果戰爭的盡頭是希望</h2>
          <p class="text-xs sm:text-sm text-gray-400 tracking-widest whitespace-nowrap">你想對愛的人說什麼？</p>
        </div>

        <div class="relative group">
          <div class="absolute -inset-0.5 bg-gradient-to-r from-gray-700 to-gray-800 rounded-md blur opacity-30 group-hover:opacity-50 transition duration-1000"></div>
          <textarea id="input-message" placeholder="寫下你的思念..." class="relative w-full bg-black/60 backdrop-blur-md border border-gray-600 rounded-md pb-2 pt-4 px-4 text-gray-200 focus:outline-none focus:border-gray-400 transition-colors resize-none h-32 placeholder:text-gray-600 tracking-wider text-sm leading-relaxed shadow-inner"></textarea>
        </div>

        <div class="relative group">
          <p class="text-[10px] sm:text-xs text-gray-500 mb-2 tracking-wider drop-shadow-md whitespace-nowrap">這份信件，將於半年後寄出。</p>
          <div class="absolute -inset-0.5 bg-gradient-to-r from-gray-700 to-gray-800 rounded-md blur opacity-30 group-hover:opacity-50 transition duration-1000"></div>
          <input id="input-email" type="email" placeholder="收件人 Email" class="relative w-full bg-black/60 backdrop-blur-md border border-gray-600 rounded-md py-3 px-4 text-gray-200 focus:outline-none focus:border-gray-400 transition-colors placeholder:text-gray-600 tracking-wider text-sm shadow-inner" />
        </div>

        <button id="btn-submit" type="button" class="w-full py-4 mt-8 border border-gray-500 bg-white/10 backdrop-blur-md text-gray-200 rounded-md hover:bg-white/20 hover:text-white transition-all duration-500 tracking-[0.15em] sm:tracking-[0.2em] text-xs sm:text-sm flex items-center justify-center space-x-3 whitespace-nowrap shadow-lg">
          <span id="btn-text">將信件摺疊起來</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <path d="M2 15h10"></path>
            <path d="m9 18 3-3-3-3"></path>
          </svg>
        </button>
      </form>
    </div>

    <!-- 步驟 3 -->
    <div id="step-3" class="absolute w-full px-6 fade-transition step-hidden text-center tracking-[0.15em] sm:tracking-[0.2em] leading-loose drop-shadow-lg">
      <p class="text-gray-100 mb-6 text-base sm:text-lg whitespace-nowrap">信件已投向遠方。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">那些轟炸與恐懼終將遠去。</p>
      <p class="text-gray-300 text-xs sm:text-sm whitespace-nowrap">半年後，</p>
      <p class="text-gray-100 text-xs sm:text-sm whitespace-nowrap">這份希望將會抵達。</p>
      <div class="pt-20">
        <p class="text-[10px] sm:text-xs text-gray-400 tracking-widest animate-pulse whitespace-nowrap">挺過之後一切都會變好的。</p>
      </div>
    </div>
  </div>

  <!-- 紙飛機等待投擲專區 -->
  <div id="airplane-wrapper">
    <div id="airplane" class="floating-plane">
      <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </div>
    <div id="throw-hint">▲ 向上滑動，將希望寄出 ▲</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD5_p-5RLRJbLLWRDbh7Im2lDTwqQgseRI",
      authDomain: "atr2026-b538a.firebaseapp.com",
      projectId: "atr2026-b538a",
      storageBucket: "atr2026-b538a.firebasestorage.app",
      messagingSenderId: "484101433417",
      appId: "1:484101433417:web:659f1dba534ed90ae3b798",
      measurementId: "G-XDCKP1ZZVZ"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    const initAuth = async () => {
      try { await signInAnonymously(auth); } catch (error) { console.warn("容錯模式:", error); }
    };
    initAuth();
    onAuthStateChanged(auth, (user) => { currentUser = user; });

    // ==========================================
    // 劇院級音效合成系統 (Web Audio API)
    // ==========================================
    let audioCtx;
    let bgmGain;

    // 1. 初始化音效引擎
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 2. 播放防空洞低頻轟鳴 (持續播放)
    function playBunkerDrone() {
      const osc = audioCtx.createOscillator();
      bgmGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 55; // 極低的轟鳴頻率
      
      osc.connect(bgmGain);
      bgmGain.connect(audioCtx.destination);
      
      // 緩慢淡入
      bgmGain.gain.setValueAtTime(0, audioCtx.currentTime);
      bgmGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 3);
      osc.start();
    }

    // 3. 播放摺紙沙沙聲
    function playFoldSound() {
      const bufferSize = audioCtx.sampleRate * 0.15; // 0.15秒短促音
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1; // 白噪音
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1500; // 過濾掉低音，聽起來像紙張
      
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
    }

    // 4. 播放風切聲與穿梭音 (滑動投擲時)
    function playWhooshSound() {
      const bufferSize = audioCtx.sampleRate * 4; // 4秒長的風聲
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.Q.value = 0.8;
      
      // 頻率掃描：模擬物體快速飛過的督卜勒效應
      filter.frequency.setValueAtTime(200, audioCtx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 1);
      filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 3.5);
      
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 1);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 4);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
    }

    // 5. 播放希望和弦 (結尾時)
    function playHopeChime() {
      // 關閉低頻轟鳴
      if(bgmGain) {
        bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
      }

      // C大調和弦 (C5, E5, G5)
      const freqs = [523.25, 659.25, 783.99]; 
      freqs.forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        // 階梯式發聲與綿長的殘響
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5 + i * 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 6);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 6);
      });
    }


    // --- 3D 粒子星空 ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    const numParticles = 10000; 
    let baseSpeed = 1.0, currentSpeed = baseSpeed, targetSpeed = baseSpeed;
    let isFlying = false;  

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < numParticles; i++) {
      particles.push({
        x: (Math.random() - 0.5) * 4000, y: (Math.random() - 0.5) * 4000, z: Math.random() * 3000,
        size: Math.random() * 1.5 + 0.3, isEmber: Math.random() > 0.85
      });
    }

    function renderCanvas() {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = `rgba(0, 0, 0, ${isFlying ? 0.6 : 0.25})`; 
      ctx.fillRect(0, 0, width, height);
      
      ctx.globalCompositeOperation = 'source-over';
      currentSpeed += (targetSpeed - currentSpeed) * 0.03;
      const centerX = width / 2, centerY = height / 2, fov = 400; 

      particles.forEach(p => {
        p.z -= currentSpeed;
        if (p.z <= 0) {
          p.z = 3000; p.x = (Math.random() - 0.5) * 4000; p.y = (Math.random() - 0.5) * 4000;
        }
        const scale = fov / p.z;
        const screenX = centerX + p.x * scale, screenY = centerY + p.y * scale;
        const opacity = Math.min((3000 - p.z) / 1000, 1);
        const radius = Math.max(p.size * scale, 0.1);

        if (screenX > 0 && screenX < width && screenY > 0 && screenY < height) {
          ctx.beginPath();
          ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
          if (isFlying) {
            ctx.fillStyle = `rgba(220, 240, 255, ${opacity * 0.9})`;
          } else {
            ctx.fillStyle = p.isEmber ? `rgba(200, 50, 50, ${opacity * 0.9})` : `rgba(130, 130, 130, ${opacity * 0.5})`;
          }
          ctx.fill();
        }
      });
      requestAnimationFrame(renderCanvas);
    }
    renderCanvas();

    // --- UI 流程控制 ---
    const step0 = document.getElementById('step-0');
    const step1 = document.getElementById('step-1');
    const step3 = document.getElementById('step-3');
    const btnEnter = document.getElementById('btn-enter');
    const inputMessage = document.getElementById('input-message');
    const inputEmail = document.getElementById('input-email');
    const btnSubmit = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    
    const airplaneWrapper = document.getElementById('airplane-wrapper');
    const airplane = document.getElementById('airplane');
    const throwHint = document.getElementById('throw-hint');
    const centerLight = document.getElementById('center-light');
    const panoramaBg = document.getElementById('panorama-bg');
    const whiteOut = document.getElementById('white-out');

    function switchStep(hideElem, showElem) {
      hideElem.classList.remove('step-active');
      hideElem.classList.add('step-hidden');
      setTimeout(() => {
        showElem.classList.remove('step-hidden');
        showElem.classList.add('step-active');
      }, 1500); 
    }

    // ★ 進入時觸發防空洞低頻音效
    btnEnter.addEventListener('click', () => { 
      initAudio();
      playBunkerDrone(); 
      switchStep(step0, step1); 
    });

    // ★ 點擊摺疊按鈕時觸發紙張沙沙聲音效
    btnSubmit.addEventListener('click', async () => {
      const msgVal = inputMessage.value.trim();
      const emailVal = inputEmail.value.trim();
      
      if (!msgVal || !emailVal) {
        const origText = "將信件摺疊起來";
        btnText.textContent = "請填寫思念與收件信箱";
        setTimeout(() => btnText.textContent = origText, 3000);
        return;
      }

      // 播放摺紙音效
      playFoldSound();

      btnSubmit.disabled = true;
      btnText.textContent = "摺疊中...";
      
      const uid = currentUser ? currentUser.uid : "guest-" + Math.floor(Math.random() * 100000);

      try {
        const messagesRef = collection(db, 'fringe2026_messages');
        await addDoc(messagesRef, {
          userId: uid,
          message: msgVal,
          email: emailVal,
          createdAt: serverTimestamp(),
          scheduledSendTime: new Date(Date.now() + 180 * 24 * 60 * 60 * 1000), 
          status: 'pending' 
        });
      } catch (error) { console.warn("寫入失敗:", error); }

      step1.classList.remove('step-active');
      step1.classList.add('folding-out');

      setTimeout(() => {
        airplaneWrapper.style.opacity = '1';
        airplaneWrapper.style.pointerEvents = 'auto'; 
      }, 1000);
    });

    let startY = 0, isDragging = false, hasThrown = false; 

    const handleStart = (e) => {
      if (hasThrown) return;
      isDragging = true;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      airplane.style.transform = "scale(1.1)"; 
    };

    const handleMove = (e) => {
      if (!isDragging || hasThrown) return;
      const currentY = e.touches ? e.touches[0].clientY : e.clientY;
      if (startY - currentY > 50) {
        isDragging = false;
        hasThrown = true;
        executeThrow();
      }
    };

    const handleEnd = () => {
      if (hasThrown) return;
      isDragging = false;
      airplane.style.transform = ""; 
    };

    airplaneWrapper.addEventListener('touchstart', handleStart);
    airplaneWrapper.addEventListener('touchmove', handleMove);
    airplaneWrapper.addEventListener('touchend', handleEnd);
    airplaneWrapper.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    // ★ 投擲時觸發風切聲，結尾觸發希望和弦
    function executeThrow() {
      playWhooshSound(); // 播放風切穿梭聲

      throwHint.style.opacity = '0';
      airplane.classList.remove('floating-plane');
      airplaneWrapper.style.pointerEvents = 'none';

      airplane.classList.add('fly-animation');
      isFlying = true;
      targetSpeed = 60.0; 
      centerLight.classList.add('light-active'); 
      panoramaBg.classList.add('panorama-flying'); 

      setTimeout(() => {
        targetSpeed = baseSpeed; 
        step3.classList.remove('step-hidden'); 
        step3.classList.add('step-active');
        
        playHopeChime(); // 播放希望和弦，同時淡出低頻轟鳴

        setTimeout(() => { whiteOut.classList.add('white-out-active'); }, 15000);
        setTimeout(() => { window.location.href = 'index.html'; }, 20000);
      }, 4500); 
    }
  </script>
</body>
</html>
